<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1419" />
    <title>PaperCast Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Inter (UI) and JetBrains Mono (code/JSON). Source Han Sans CN
      can't be reliably preloaded from Google Fonts; we let the system
      stack pick up the locally installed copy (it ships with macOS
      and is preinstalled on most Chinese Windows boxes via Adobe
      Source Han / Microsoft YaHei fallback).
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
